<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>垂直跑酷 Vertical Parkour</title>
    <meta name="description" content="A minimalist vertical parkour game demo optimized for mobile">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-layer">
            <div id="score">Height: 0</div>
            
            <div id="start-screen">
                <h1>垂直跑酷</h1>
                <p>向上跳躍，躲避紅塊，抵達終點！</p>
                <p class="subtitle">VERTICAL PARKOUR</p>
                <p style="margin-top: 1.5rem; font-size: 0.9rem;">點擊螢幕 或 按空白鍵開始</p>
            </div>
            
            <div id="game-over-screen" class="hidden">
                <h2 id="end-title">GAME OVER</h2>
                <p id="end-msg">你墜落了...</p>
                <p>到達高度: <span id="final-score">0</span></p>
                <p style="margin-top: 1rem; font-size: 0.9rem;">點擊螢幕重新開始</p>
            </div>
        </div>

        <!-- 虛擬按鍵 (Mobile Controls) -->
        <div id="mobile-controls" class="hidden">
            <div class="control-group-left">
                <button id="btn-left" class="control-btn">◀</button>
                <button id="btn-right" class="control-btn">▶</button>
            </div>
            <div class="control-group-right">
                <button id="btn-jump" class="control-btn jump-btn">▲</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
