<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>迷宮跑酷 Maze Platformer</title>
    <meta name="description" content="A minimalist maze platformer game demo optimized for mobile">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-layer">
        <!-- HUD (計時器與生命值) -->
        <div id="hud" class="hud-container hidden">
            <div class="hud-left">
                <div id="level-indicator">Level 1</div>
                <div id="timer">00:00.00</div>
            </div>
            <div id="lives"></div>
        </div>
        <div id="fps-counter" class="fps-counter">FPS: 0</div>

        <!-- 死亡答題畫面 -->
        <div id="question-screen" class="hidden">
            <h2 id="question-title">問題</h2>
            <div id="question-options" class="options-grid"></div>
        </div>

        <div id="score" class="hidden">00000</div>
        
        <div id="start-screen">
                <h1>迷宮跑酷</h1>
                <p>探索封閉迷宮，躲避紅色陷阱，尋找綠色終點！</p>
                <p class="subtitle">MAZE PLATFORMER</p>
                <p style="margin-top: 1.5rem; font-size: 0.9rem;">點擊螢幕 或 按空白鍵開始</p>
            </div>
            
            <div id="game-over-screen" class="hidden">
                <h2 id="end-title">GAME OVER</h2>
                <p id="end-msg">你碰到了陷阱...</p>
                <div id="leaderboard-container" class="hidden">
                    <h3 class="leaderboard-title">🏆 最佳成績 🏆</h3>
                    <ul id="leaderboard-list"></ul>
                </div>
                <p style="margin-top: 1rem; font-size: 0.9rem;">點擊螢幕重新開始</p>
            </div>
        </div>

        <!-- 虛擬按鍵 (Mobile Controls) -->
        <div id="mobile-controls" class="hidden">
            <div class="control-group-left">
                <button id="btn-left" class="control-btn">◀</button>
                <button id="btn-right" class="control-btn">▶</button>
            </div>
            <div class="control-group-right">
                <button id="btn-jump" class="control-btn jump-btn">▲</button>
            </div>
        </div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
