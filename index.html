<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡跑酷 Minimalist Parkour</title>
    <meta name="description" content="A simple minimalist parkour game demo">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <div id="ui-layer">
            <div id="score">SCORE: 0</div>
            <div id="start-screen">
                <h1>極簡跑酷</h1>
                <p>按 <strong>空白鍵</strong> 或 <strong>點擊螢幕</strong> 開始與跳躍</p>
                <p class="subtitle">MINIMALIST PARKOUR</p>
            </div>
            <div id="game-over-screen" class="hidden">
                <h2>GAME OVER</h2>
                <p>最終得分: <span id="final-score">0</span></p>
                <p style="margin-top: 1rem; font-size: 0.9rem;">按 空白鍵 / 點擊螢幕 重新開始</p>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
